name: CTS-Gate Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4.2.2

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install protoc
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

    - name: Cache Rust
      uses: Swatinem/rust-cache@v2

    - name: Run clippy
      run: cargo clippy --locked -- -D warnings

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - uses: actions/checkout@v4.2.2

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install protoc
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

    - name: Cache Rust
      uses: Swatinem/rust-cache@v2

    - name: Build
      run: cargo build --locked --release

    - name: Check endpoint reachability
      run: |
        echo "Checking https://lightwalletd.testnet.cipherscan.app ..."
        curl --fail --silent --max-time 10 \
          https://lightwalletd.testnet.cipherscan.app \
          && echo "✅ Endpoint reachable" \
          || (echo "❌ Endpoint unreachable — tests skipped, this is not a code failure" && exit 1)

    - name: Run MVP test suite
      run: |
        mkdir -p reports
        ./target/release/cts-gate run \
          --profile lightwalletd \
          --suite mvp \
          --output reports

    - name: Upload reports
      if: always()
      uses: actions/upload-artifact@v4.6.2
      with:
        name: test-reports
        path: reports/
        if-no-files-found: error
